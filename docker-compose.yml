# Free / self-hosted stack for local development (Phases 0–7).
#   docker compose up -d postgres
#   export DATABASE_URL=postgres://customfolio:customfolio@localhost:5432/customfolio
#   cargo run -p customfolio-server --bin customfolio-api
# Optional full stack: docker compose up -d  (builds api image if Dockerfile present)

services:
  postgres:
    image: postgres:16-alpine
    container_name: customfolio-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: customfolio
      POSTGRES_PASSWORD: customfolio
      POSTGRES_DB: customfolio
    volumes:
      - customfolio_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U customfolio -d customfolio"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://customfolio:customfolio@postgres:5432/customfolio
      HOST: 0.0.0.0
      PORT: "8080"
      DATA_DIR: /data/imports
      MAX_UPLOAD_BYTES: "52428800"
      CORS_ORIGIN: http://localhost:3000
    volumes:
      - customfolio_imports:/data/imports
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  customfolio_pgdata:
  customfolio_imports:
