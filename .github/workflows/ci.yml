name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    # Enforce on PRs into main; merges already passed this check on the PR.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require CHANGELOG.md for feat/fix/perf
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1 2>/dev/null \
            || git fetch origin "${{ github.base_ref }}"
          ./scripts/check-changelog.sh "origin/${{ github.base_ref }}" HEAD

  rust:
    name: Rust (cli)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Release build
        run: cargo build --release -p customfolio

      - name: Smoke create (non-interactive)
        run: |
          ./target/release/customfolio create ci-smoke \
            --output /tmp/ci-smoke \
            --domain fullstack \
            --full-name "CI User" \
            --yes
          test -f /tmp/ci-smoke/content/portfolio.json
          test -f /tmp/ci-smoke/package.json

  template:
    name: Next template
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: template
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: template/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
